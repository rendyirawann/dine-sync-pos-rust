<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <title>Ambil Nomor Antrian — DineSync</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Inter:300,400,500,600,700" />
    <link href="/assets/plugins/global/plugins.bundle.css" rel="stylesheet" type="text/css" />
    <link href="/assets/css/style.bundle.css" rel="stylesheet" type="text/css" />
    <style>body{background:linear-gradient(135deg,#1b1b29,#2b2b40);min-height:100vh}</style>
</head>
<body class="d-flex flex-column align-items-center justify-content-center">
    <div class="card shadow-lg w-100 mw-450px m-5">
        {% if taken %}
        <div class="card-body text-center p-10">
            <span class="text-muted fw-semibold d-block mb-2">Nomor Antrian Anda</span>
            <div class="fw-bolder text-primary" style="font-size:7rem;line-height:1">{{ taken }}</div>
            <div class="fs-4 fw-bold text-gray-800 mt-3">{{ taken_name }}</div>
            <div class="text-muted mb-8">Mohon tunggu nomor Anda dipanggil. Terima kasih 🙏</div>
            <a href="/kiosk" class="btn btn-light-primary w-100">Ambil Nomor Lagi</a>
        </div>
        {% else %}
        <div class="card-body p-10">
            <h1 class="text-center fw-bold mb-2">Selamat Datang 👋</h1>
            <p class="text-center text-muted mb-8">Ambil nomor antrian Anda</p>
            <form method="POST" action="/kiosk/take">
                <input type="hidden" name="_token" value="{{ csrf_token }}">
                <div class="mb-5"><label class="form-label fw-semibold">Nama Anda</label><input type="text" name="customer_name" class="form-control form-control-lg form-control-solid" required placeholder="Nama"></div>
                <div class="mb-8">
                    <label class="form-label fw-semibold">Jumlah Tamu</label>
                    <div class="input-group input-group-lg">
                        <button class="btn btn-light-primary" type="button" onclick="stepPax(-1)">−</button>
                        <input type="number" id="pax" name="pax" value="1" min="1" max="20" class="form-control form-control-solid text-center fw-bold fs-2" readonly>
                        <button class="btn btn-light-primary" type="button" onclick="stepPax(1)">+</button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100">Ambil Nomor</button>
            </form>
        </div>
        {% endif %}
    </div>
    <script>
        function stepPax(d){var el=document.getElementById('pax');var v=Math.min(20,Math.max(1,parseInt(el.value||'1')+d));el.value=v;}
    </script>
</body>
</html>
